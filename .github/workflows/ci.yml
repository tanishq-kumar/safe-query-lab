name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "*.md"
      - "**/*.md"

jobs:
  build:
    runs-on: ubuntu-latest # has Docker — required for Testcontainers + jOOQ codegen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Benchmarks are compiled but never executed in CI (results would be noise on shared runners).
      - name: Build and run conformance suites
        run: ./mvnw -B verify
