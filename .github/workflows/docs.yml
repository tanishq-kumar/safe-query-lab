name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build sources and aggregate Javadocs
        run: ./mvnw -B -DskipTests compile javadoc:aggregate

      - name: Assemble Pages site
        run: python3 scripts/build-docs.py --apidocs target/reports/apidocs --out site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5.0.0

